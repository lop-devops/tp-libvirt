- virtual_network.attach_detach_device.attach_detach_ovs_interface:
    type = attach_detach_ovs_interface
    only Linux
    use_no_reboot = yes
    start_vm = no
    take_regular_screendumps = no
    login_timeout = 240
    # OVS bridge host-side IP used as ping target from guest
    bridge_ip = "192.168.100.1"
    bridge_netmask = "24"
    # Guest-side IP assigned via utils_net.set_guest_ip_addr
    guest_ip = "192.168.100.2"
    guest_netmask = "255.255.255.0"
    # Interface description – single dict consumed by
    # libvirt_vmxml.create_vm_device_by_type('interface', iface_attrs)
    iface_attrs = {'type_name': 'bridge', 'source': {'bridge': 'ovsbr'}, 'mac_address': '52:54:00:01:ab:cd', 'model': 'virtio', 'virtualport': {'type': 'openvswitch'}}
    variants:
        - without_guest_check:
            verify_guest = "no"
            variants:
                - basic:
                    attach_detach_iterations = "1"
                - stress:
                    attach_detach_iterations = "10"
        - with_guest_check:
            verify_guest = "yes"
            # network_base.ping_check reads 'vm_ping_bridge = pass'
            vm_ping_bridge = "pass"
            variants:
                - basic:
                    attach_detach_iterations = "1"
                - stress:
                    attach_detach_iterations = "10"
